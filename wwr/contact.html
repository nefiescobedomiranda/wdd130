<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Peru Rapids Rafting</title>
    <meta name="description"
      content="Get in touch with Peru Rapids Rafting. Find our address, phone, email, or use the contact form to ask questions about trips and services.">
    <meta name="author" content="Nefi Escobedo">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/z-rapids-trees.jpg" alt="Peru Rapids Rafting Logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-info">
            <h1>Peru Rapids Rafting</h1>
            <p>Av Bolognesi 320<br>
                Yanahuara, Arequipa<br>
                +1 999 999 9999<br>
                perurapidsrafting@gmail.com
            </p>
        </section>

        <section class="contact-map-form">
            <div class="map-form-flex">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d3218.7274039763706!2d-71.53680292443651!3d-16.387531133714315!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2sus!4v1775172923835!5m2!1ses!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>

                <form class="contact-form" action="#" method="post">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>

                    <p>Message Purpose:</p>
                    <input type="radio" id="general" name="purpose" value="general" required>
                    <label for="general">General Inquiry</label><br>
                    <input type="radio" id="booking" name="purpose" value="booking">
                    <label for="booking">Reservation Question</label><br>
                    <input type="radio" id="website" name="purpose" value="website">
                    <label for="website">Website Suggestion</label><br>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"
                      placeholder="Type your message here..." required></textarea>

                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Please Subscribe me to the monthly
                        newsletter</label><br><br>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="team">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="Nefi Escobedo - Senior Guide">
                    <figcaption>Nefi Escobedo - Senior Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Daniel Escobedo - Trip Coordinator">
                    <figcaption>Daniel Escobedo - Trip Coordinator</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Simba Mauricio - Safety Officer">
                    <figcaption>Simba Mauricio - Safety Officer</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <footer>
        <p>© 2026 🌲 Peru Rapids Rafting 🌲 Nefi Escobedo</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-square.svg" alt="Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="LinkedIn">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-square.svg" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
